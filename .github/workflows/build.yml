name: Build All Platforms

on:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows

      - name: Build Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libgtk-3-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libasound2-dev libpulse-dev libdbus-1-dev
          flutter build linux

      - name: Build Android
        run: flutter build apk --release --split-per-abi

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign
        continue-on-error: true

      - name: Build macOS
        run: |
          flutter build macos
        continue-on-error: true

      - name: Build HarmonyOS
        run: |
          echo "Building HarmonyOS..."
          # HarmonyOS build commands will be added here when Flutter supports it
        continue-on-error: true

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/windows/runner/Release/furwallplus.exe
            build/linux/x64/release/bundle/furwallplus
            build/app/outputs/flutter-apk/*.apk
            build/ios/iphoneos/Runner.app
            build/macos/Build/Products/Release/furwallplus.app
          draft: false
          prerelease: false
