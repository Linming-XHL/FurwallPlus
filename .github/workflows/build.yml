name: Build Windows and Android

on:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version from git tag
        id: get_version
        run: |
          $tag = git describe --tags --abbrev=0
          $versionCode = $tag -replace 'v','' -replace '\.',''
          echo "version=$tag" >> $env:GITHUB_OUTPUT
          echo "versionCode=$versionCode" >> $env:GITHUB_OUTPUT
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --build-name=${{ steps.get_version.outputs.version }} --build-number=${{ steps.get_version.outputs.versionCode }}
      - name: Create Windows zip package
        run: |
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath ../../../../../windows-build.zip
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: windows-build.zip

  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version from git tag
        id: get_version
        run: |
          tag=$(git describe --tags --abbrev=0)
          versionCode=$(echo $tag | sed 's/v//g' | sed 's/\.//g')
          echo "version=$tag" >> $GITHUB_OUTPUT
          echo "versionCode=$versionCode" >> $GITHUB_OUTPUT
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Build Android
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.get_version.outputs.version }} --build-number=${{ steps.get_version.outputs.versionCode }}
      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/app/outputs/flutter-apk/

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-build/windows-build.zip
            artifacts/android-build/*.apk
          draft: false
          prerelease: false
